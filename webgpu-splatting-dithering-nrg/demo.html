<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live KPCN Denoiser Demo</title>
    <script type="importmap">
    {
        "imports": {
            "engine/": "./engine/",
            "dat": "./lib/dat.js",
            "glm": "./lib/glm.js"
        }
    }
    </script>
    <style>
        body { font-family: monospace; margin: 0; background: #111; color: #ddd; }
        header { padding: .6rem 1rem; }
        h1 { font-size: 1rem; margin: 0 0 .2rem; font-weight: bold; }
        #stats { font-size: .8rem; color: #9c9; min-height: 1.2em; }
        #views { display: flex; gap: 1rem; padding: 0 1rem 1rem; flex-wrap: wrap; }
        figure { margin: 0; }
        figcaption { font-size: .8rem; padding: .3rem 0; color: #bbb; }
        canvas { display: block; image-rendering: pixelated; background: #000;
                 width: 512px; height: 512px; touch-action: none; cursor: grab; }
        canvas:active { cursor: grabbing; }
        #log { padding: .4rem 1rem; white-space: pre-wrap; line-height: 1.35;
               font-size: .75rem; color: #888; max-height: 8rem; overflow: auto; }
        kbd { background:#333; border-radius:3px; padding:0 .3em; }
    </style>
    <script type="module" src="demo.js"></script>
</head>
<body>
    <header>
        <h1>Real-time KPCN denoising of stochastic Gaussian-splatting renders</h1>
        <div id="stats">initializing&hellip;</div>
        <div style="font-size:.75rem;color:#888">
            drag = orbit &nbsp; wheel = zoom &nbsp; <kbd>space</kbd> = pause auto-spin
        </div>
    </header>
    <div id="views">
        <figure>
            <canvas id="noisy" width="512" height="512"></canvas>
            <figcaption>Renderer output &mdash; 1&nbsp;spp (noisy input)</figcaption>
        </figure>
        <figure>
            <canvas id="denoised" width="512" height="512"></canvas>
            <figcaption>KPCN U-Net &mdash; denoised (live)</figcaption>
        </figure>
    </div>
    <pre id="log">Starting&hellip;</pre>
</body>
</html>
